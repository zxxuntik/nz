<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursultan - Найкращий клієнт</title>
    <style>
        /* --- STYLE.CSS (Вбудовано) --- */
        
        /* Скидання стилів та шрифти */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .lang-select {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-btn {
            text-decoration: none;
            color: #ccc;
            font-size: 16px;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-btn:hover {
            color: #fff;
        }

        .btn-blue {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white !important;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-blue:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10%;
            padding-top: 80px; /* Компенсація хедера */
            overflow: hidden;
        }

        .content-box {
            flex: 1;
            z-index: 10;
            max-width: 600px;
        }

        h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .cta-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-outline:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .visual-box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Імітація зображення персонажа/інтерфейсу */
        .character-placeholder {
            width: 400px;
            height: 500px;
            background: linear-gradient(180deg, rgba(20, 40, 80, 0.4), rgba(5, 10, 20, 0.9));
            border: 1px solid rgba(0, 198, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 198, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .character-placeholder::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 198, 255, 0.1) 0%, transparent 60%);
            animation: float 6s ease-in-out infinite;
        }

        /* Декоративні елементи інтерфейсу */
        .ui-element {
            position: absolute;
            background: rgba(10, 20, 40, 0.8);
            border: 1px solid rgba(0, 198, 255, 0.3);
            padding: 10px;
            border-radius: 8px;
            color: #00c6ff;
            font-size: 12px;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.1);
        }
        
        .ui-top-right { top: 10%; right: -5%; width: 150px; animation: float 8s infinite; }
        .ui-bottom-right { bottom: 15%; right: 10%; width: 120px; animation: float 10s infinite; }

        /* --- LEAVES ANIMATION (CSS only) --- */
        .leaves-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            top: -50px;
            width: 20px; /* Середній розмір */
            height: 20px;
            background: #00c6ff;
            opacity: 0.6;
            border-radius: 50% 0 50% 0;
            animation: fall linear infinite;
        }
