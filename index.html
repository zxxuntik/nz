<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NURSULTAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Основные стили */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
      color: #fff;
      overflow-x: hidden;
      height: 100vh;
    }

    /* Контейнер */
    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding-left: 50px;
      box-sizing: border-box;
      z-index: 1;
    }

    h1 {
      font-size: 3rem;
      margin: 0 0 20px 0;
    }

    p {
      font-size: 1.5rem;
      max-width: 600px;
      line-height: 1.5;
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      padding: 12px 25px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 15px;
      transition: all 0.3s ease;
    }

    .btn-buy {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: #fff;
    }

    .btn-buy:hover {
      transform: scale(1.05);
    }

    .btn-more {
      background: #333;
      color: #fff;
    }

    .btn-more:hover {
      background: #555;
    }

    /* Анимация листьев */
    .leaf {
      position: absolute;
      width: 30px;
      height: 30px;
      background: url('781c020d-7a7a-4af2-971b-061141ac85d6.png') no-repeat center/contain;
      pointer-events: none;
      animation-name: fall;
      animation-iteration-count: infinite;
      animation-timing-function: linear;
    }

    @keyframes fall {
      0% {
        transform: translateY(-50px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0.7;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Про нас</h1>
    <p>Ми надаємо вам найкращий клієнт для комфортної гри, який подарує вам найяскравіші враження від гри.</p>
    <div class="buttons">
      <button class="btn btn-buy">Купити</button>
      <button class="btn btn-more">Докладніше</button>
    </div>
  </div>

  <script>
    // Генерація листя
    const numLeaves = 15; // кількість листя
    for(let i=0; i<numLeaves; i++){
      const leaf = document.createElement('div');
      leaf.classList.add('leaf');
      leaf.style.left = Math.random() * 100 + 'vw';
      leaf.style.animationDuration = 5 + Math.random() * 5 + 's';
      leaf.style.animationDelay = Math.random() * 5 + 's';
      document.body.appendChild(leaf);
    }
  </script>
</body>
</html>
